<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>SmartCurrency — University of San Agustin</title>
  <style>
    :root {
      --usa-red: #b3121f;
      --usa-red-dark: #8a0d18;
      --usa-gold: #f5c518;
      --usa-gold-dim: #b8911a;
      --bg: #000000;
      --panel: #0f0f0f;
      --text: #ffffff;
      --muted: #8a8a8a;
      --border: #2a2a2a;
      --ok: #6ee7a0;
      --err: #ff8c8c;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      overscroll-behavior: none;
    }

    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 14px;
      padding-bottom: 30px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 2px 14px;
    }

    .logo-wrap {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
      background: #000;
      border: 2px solid var(--usa-gold);
      display: grid;
      place-items: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .brand {
      flex: 1;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .brand .sub {
      color: var(--usa-gold);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .viewport {
      position: relative;
      width: 100%;
      aspect-ratio: 3/4;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    video,
    canvas#snap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas#snap {
      display: none;
    }

    .placeholder {
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    .frame-guide {
      position: absolute;
      inset: 12% 8%;
      border: 2px dashed rgba(245, 197, 24, 0.55);
      border-radius: 12px;
      pointer-events: none;
      display: none;
    }

    .frame-guide.show {
      display: block;
    }

    .result-overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 14px;
      text-align: center;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.92), transparent);
      pointer-events: none;
      display: none;
    }

    .result-overlay.show {
      display: block;
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .result-overlay .value {
      font-size: 44px;
      font-weight: 900;
      color: var(--usa-gold);
      line-height: 1.1;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 16px 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 66px;
      transition: transform 0.08s ease;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-camera {
      background: var(--usa-red);
    }

    .btn-speak {
      background: var(--usa-gold);
      color: #1a1100;
    }

    .status-line {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
      text-align: center;
    }

    .status-line.ok {
      color: var(--ok);
    }

    .status-line.err {
      color: var(--err);
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="logo-wrap">
        <img
          src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23b3121f'/%3E%3Cpath d='M30 70 L50 30 L70 70' fill='none' stroke='%23f5c518' stroke-width='8'/%3E%3C/svg%3E" />
      </div>
      <div class="brand">
        <h1>SmartCurrency</h1>
        <div class="sub">UNIVERSITY OF SAN AGUSTIN</div>
      </div>
    </header>

    <div class="viewport">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="snap"></canvas>
      <div class="placeholder" id="placeholder">
        <div class="t1">Camera Ready</div>
        <div class="t2">Tap Start Camera to begin</div>
      </div>
      <div class="frame-guide" id="guide"></div>
      <div class="result-overlay" id="result-overlay">
        <div class="value" id="result-value">---</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-camera" id="btn-camera">Start Camera</button>
      <button class="btn btn-speak" id="btn-scan" disabled>Scan Bill</button>
      <button class="btn" style="background:%231a1a1a; border:1px solid %232a2a2a"
        onclick="location.reload()">Reset</button>
    </div>

    <div class="status-line" id="status">Ready</div>
  </div>

  <script>
    const video = document.getElementById('video');
    const snap = document.getElementById('snap');
    const status = document.getElementById('status');
    const btnCamera = document.getElementById('btn-camera');
    const btnScan = document.getElementById('btn-scan');
    const resultOverlay = document.getElementById('result-overlay');
    const resultValue = document.getElementById('result-value');
    const placeholder = document.getElementById('placeholder');
    const guide = document.getElementById('guide');

    let stream = null;

    async function startCamera() {
      try {
        status.textContent = "Accessing camera...";
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        btnCamera.hidden = true;
        btnScan.disabled = false;
        placeholder.hidden = true;
        guide.classList.add('show');
        status.textContent = "Camera Active";
        status.className = "status-line ok";
      } catch (err) {
        status.textContent = "Camera Error: " + err.message;
        status.className = "status-line err";
      }
    }

    async function recognizeBill() {
      const apiKey = 'AQ.Ab8RN6Inq5xvOu9_kB-7ALyYs9KkEFbLb07jbYhYj1SHlS8GDw';
      const canvas = snap;
      const context = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      context.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      const base64Data = dataUrl.split(',')[1];

      status.textContent = "Identifying bill...";
      status.className = "status-line";

      const prompt = "Identify this Philippine Peso bill. Return only the value (e.g. 20, 50, 100, 200, 500, 1000). If not a bill, say 'Unknown'.";

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
          })
        });

        const data = await response.json();
        const result = data.candidates[0].content.parts[0].text.trim();

        if (result.includes("Unknown")) {
          status.textContent = "Bill not recognized. Try again.";
          status.className = "status-line err";
        } else {
          resultValue.textContent = "₱" + result;
          resultOverlay.classList.add('show');
          status.textContent = "Success!";
          status.className = "status-line ok";
          speak("Detected " + result + " Pesos");
        }
      } catch (err) {
        status.textContent = "API Error: " + err.message;
        status.className = "status-line err";
      }
    }

    function speak(text) {
      const utterance = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(utterance);
    }

    btnCamera.addEventListener('click', startCamera);
    btnScan.addEventListener('click', recognizeBill);

  </script>
</body>

</html>
