<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<title>SmartCurrency — University of San Agustin</title>
<style>
  :root {
    --usa-red: #b3121f;
    --usa-red-dark: #8a0d18;
    --usa-gold: #f5c518;
    --usa-gold-dim: #b8911a;
    --bg: #000000;
    --panel: #0f0f0f;
    --text: #ffffff;
    --muted: #8a8a8a;
    --border: #2a2a2a;
    --ok: #6ee7a0;
    --err: #ff8c8c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    overscroll-behavior: none;
  }
  .app { max-width: 720px; margin: 0 auto; padding: 14px; padding-bottom: 30px; }

  header { display: flex; align-items: center; gap: 12px; padding: 6px 2px 14px; }
  .logo-wrap {
    width: 56px; height: 56px; flex-shrink: 0;
    border-radius: 50%; overflow: hidden;
    background: #000;
    border: 2px solid var(--usa-gold);
    display: grid; place-items: center;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .brand { flex: 1; min-width: 0; }
  .brand h1 { margin: 0; font-size: 21px; font-weight: 800; letter-spacing: 0.3px; }
  .brand .sub { color: var(--usa-gold); font-size: 10.5px; font-weight: 700; letter-spacing: 1px; margin-top: 2px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 11px; border: 1px solid var(--border); border-radius: 999px;
    font-size: 11.5px;
  }
  .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b3b; }
  .status-pill.online .dot { background: #2ecc71; }

  .tabs {
    display: flex; background: #0a0a0a; border: 1px solid var(--border);
    border-radius: 999px; padding: 4px; margin: 4px 0 14px;
  }
  .tab {
    flex: 1; padding: 10px 8px; background: transparent; border: none;
    color: var(--muted); font-weight: 800; font-size: 13px; letter-spacing: 1px;
    border-radius: 999px; cursor: pointer; font-family: inherit;
  }
  .tab.active { background: var(--usa-red); color: var(--usa-gold); }

  .viewport {
    position: relative; width: 100%; aspect-ratio: 3/4;
    background: #0a0a0a; border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; display: grid; place-items: center;
  }
  video, canvas#snap {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  }
  canvas#snap { display: none; }
  .placeholder { color: var(--muted); text-align: center; padding: 20px; }
  .placeholder svg { width: 56px; height: 56px; opacity: 0.45; margin-bottom: 12px; }
  .placeholder .t1 { font-size: 18px; color: #b0b0b0; margin-bottom: 4px; }
  .placeholder .t2 { font-size: 13px; color: var(--muted); }
  .frame-guide {
    position: absolute; inset: 12% 8%;
    border: 2px dashed rgba(245, 197, 24, 0.55);
    border-radius: 12px; pointer-events: none; display: none;
  }
  .frame-guide.show { display: block; }
  .frame-guide.scanning { border-color: var(--usa-gold); animation: pulse 0.9s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .result-overlay {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 16px 14px; text-align: center;
    background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
    pointer-events: none; display: none;
  }
  .result-overlay.show { display: block; animation: slideUp 0.25s ease-out; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .result-overlay .label { font-size: 13px; color: #ddd; margin-bottom: 2px; }
  .result-overlay .value { font-size: 44px; font-weight: 900; color: var(--usa-gold); line-height: 1.1; }

  .voice-row { display: flex; align-items: center; gap: 10px; margin: 12px 0 6px; flex-wrap: wrap; }
  .listen-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 9px 16px; border-radius: 999px;
    font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
  }
  .listen-btn.active { background: var(--usa-red); border-color: var(--usa-red); }
  .listen-btn.active::before {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: var(--usa-gold); animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .listen-hint { color: var(--muted); font-size: 13px; }

  .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 6px; }
  .chip {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 8px 14px; border-radius: 999px;
    font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 600;
  }
  .chip:active { background: #1a1a1a; }
  .chip.toggle-on { background: var(--usa-gold-dim); border-color: var(--usa-gold-dim); color: #1a1100; }

  .hint { color: var(--muted); font-size: 17px; margin: 14px 0 10px; }

  .actions { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-top: 4px; }
  .btn {
    border: none; border-radius: 14px; padding: 16px 12px; cursor: pointer;
    font-size: 16px; font-weight: 800; color: #fff; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 66px; line-height: 1.15;
    transition: transform 0.08s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg { width: 20px; height: 20px; flex-shrink: 0; }
  .btn-camera { background: var(--usa-red); }
  .btn-camera:active { background: var(--usa-red-dark); }
  .btn-speak { background: var(--usa-gold); color: #1a1100; }
  .btn-speak:active { background: var(--usa-gold-dim); }
  .btn-speak:disabled { background: #3a3a3a; color: #666; cursor: not-allowed; }
  .btn-stop { background: #1a1a1a; border: 1px solid var(--border); width: 64px; padding: 0; }

  .status-line { margin-top: 14px; min-height: 22px; font-size: 14px; color: var(--muted); text-align: center; padding: 0 8px; }
  .status-line.ok { color: var(--ok); }
  .status-line.err { color: var(--err); }

  .panel { display: none; }
  .panel.active { display: block; }

  .history-summary {
    background: linear-gradient(135deg, var(--usa-red), var(--usa-red-dark));
    border-radius: 14px; padding: 18px; margin-bottom: 14px; text-align: center;
  }
  .history-summary .label { color: var(--usa-gold); font-size: 12px; font-weight: 700; letter-spacing: 1px; }
  .history-summary .total { color: #fff; font-size: 36px; font-weight: 900; margin-top: 4px; }
  .history-summary .count { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 2px; }
  .history-list { margin-top: 8px; }
  .history-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; background: #0a0a0a; border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 8px;
  }
  .history-item .amt { color: var(--usa-gold); font-weight: 800; font-size: 18px; }
  .history-item .time { color: var(--muted); font-size: 12px; }
  .history-empty { color: var(--muted); text-align: center; padding: 40px 10px; }
  .clear-btn {
    width: 100%; margin-top: 14px; padding: 12px;
    background: transparent; border: 1px solid var(--border); color: var(--err);
    border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; font-family: inherit;
  }

  .about p { color: #c7c7c7; line-height: 1.65; font-size: 14px; }
  .about h3 { color: var(--usa-gold); margin-top: 20px; margin-bottom: 8px; font-size: 14px; letter-spacing: 1px; }
  .about ul { padding-left: 20px; color: #c7c7c7; line-height: 1.65; font-size: 14px; }
  .about li { margin-bottom: 4px; }

  button:focus-visible { outline: 2px solid var(--usa-gold); outline-offset: 2px; }

  .tutorial {
    position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100;
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .tutorial.show { display: flex; }
  .tutorial-card {
    background: var(--panel); border: 1px solid var(--usa-gold); border-radius: 18px;
    padding: 24px; max-width: 460px; width: 100%; text-align: center;
  }
  .tutorial-card .step-num {
    display: inline-block; background: var(--usa-red); color: var(--usa-gold);
    width: 36px; height: 36px; line-height: 36px; border-radius: 50%;
    font-weight: 900; font-size: 18px; margin-bottom: 12px;
  }
  .tutorial-card h2 { margin: 0 0 8px; font-size: 22px; color: var(--usa-gold); }
  .tutorial-card p { color: #d0d0d0; font-size: 15px; line-height: 1.5; margin: 8px 0 18px; }
  .tutorial-card .nav { display: flex; gap: 10px; }
  .tutorial-card .nav button {
    flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 800; font-size: 15px;
    cursor: pointer; font-family: inherit;
  }
  .tutorial-card .skip { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .tutorial-card .next { background: var(--usa-red); color: #fff; }
  .tutorial-dots { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
  .tutorial-dots span { width: 8px; height: 8px; border-radius: 50%; background: #333; }
  .tutorial-dots span.active { background: var(--usa-gold); }
</style>
</head>
